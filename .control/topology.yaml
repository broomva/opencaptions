# .control/topology.yaml — Repository topology map for next-forge
# Describes all apps, packages, and their relationships.

apps:
  app:
    path: "apps/app"
    description: "Main application (Next.js App Router)"
    port: 3000
    risk: high
    domain: dashboard
    dependencies:
      - "@repo/auth"
      - "@repo/database"
      - "@repo/design-system"
      - "@repo/observability"

  api:
    path: "apps/api"
    description: "API server (Next.js Route Handlers)"
    port: 3002
    risk: high
    domain: api
    dependencies:
      - "@repo/auth"
      - "@repo/database"
      - "@repo/observability"

  web:
    path: "apps/web"
    description: "Marketing website (Next.js)"
    port: 3001
    risk: low
    domain: marketing
    dependencies:
      - "@repo/design-system"

  docs:
    path: "apps/docs"
    description: "Public documentation site"
    port: 3004
    risk: low
    domain: docs
    dependencies: []

  email:
    path: "apps/email"
    description: "Email templates (React Email)"
    port: 3003
    risk: low
    domain: email
    dependencies:
      - "@repo/email"

  storybook:
    path: "apps/storybook"
    description: "Component library explorer (Storybook)"
    port: 6006
    risk: low
    domain: design
    dependencies:
      - "@repo/design-system"

packages:
  # OpenCaptions CWI Pipeline
  types:
    path: packages/types
    description: "Core CWI type definitions and JSON Schema — zero deps, foundation for all packages"
    domain: cwi-pipeline
    risk: low
  spec:
    path: packages/spec
    description: "12-rule CWI validation engine (ATT/SYN/INT/FCC pillars)"
    domain: cwi-pipeline
    risk: low
    dependencies: [types]
  layout:
    path: packages/layout
    description: "Pretext-compatible word geometry engine for CWI caption rendering"
    domain: cwi-pipeline
    risk: low
    dependencies: [types]
  pipeline:
    path: packages/pipeline
    description: "Pipeline orchestrator, RulesMapper, and backend interfaces"
    domain: cwi-pipeline
    risk: medium
    dependencies: [types]
  backend-av:
    path: packages/backend-av
    description: "V1 Audio+Vision intent extractor (Whisper, pyannote, parselmouth)"
    domain: cwi-pipeline
    risk: medium
    dependencies: [types, pipeline]
  backend-jepa:
    path: packages/backend-jepa
    description: "V2 V-JEPA2 world model extractor (stub)"
    domain: cwi-pipeline
    risk: low
    dependencies: [types, pipeline]
  renderer:
    path: packages/renderer
    description: "Terminal renderer (ANSI color) + WebVTT exporter"
    domain: cwi-pipeline
    risk: low
    dependencies: [types, layout]
  mcp:
    path: packages/mcp
    description: "MCP server for AI agent integration"
    domain: cwi-pipeline
    risk: low
    dependencies: [types, pipeline]
  tracing:
    path: packages/tracing
    description: "Opt-in anonymous telemetry and correction collection"
    domain: cwi-pipeline
    risk: medium
    dependencies: [types]
  cli:
    path: packages/cli
    description: "Bun CLI — generate, validate, preview, export, telemetry, setup, doctor"
    domain: cwi-pipeline
    risk: medium
    dependencies: [types, spec, pipeline, backend-av, renderer, tracing]

  # next-forge infrastructure
  auth:
    path: "packages/auth"
    description: "Authentication"
    domain: auth

  database:
    path: "packages/database"
    description: "Database ORM"
    domain: database
    risk: high

  design-system:
    path: "packages/design-system"
    description: "UI components"
    domain: design

  email:
    path: "packages/email"
    description: "Email sending"
    domain: email

  observability:
    path: "packages/observability"
    description: "Logging, error tracking, monitoring"
    domain: observability

  typescript-config:
    path: "packages/typescript-config"
    description: "Shared TypeScript configuration"
    domain: infra

knowledge:
  entry_point: "docs/_index.md"
  architecture: "docs/architecture/"
  decisions: "docs/decisions/"
  runbooks: "docs/runbooks/"
  schemas: "docs/schemas/"
